[alembic]
# Ruta al script de entorno de Alembic
script_location = db/migrations

# URL de la base de datos (se sobrescribe en env.py con variable de entorno)
sqlalchemy.url = postgresql://desenreda:desenreda_pass@localhost:5432/desenreda_db

# Formato de revision
# string_format = %%(rev)s_%%(slug)s

# Directorio de salida para archivos de migracion
# output_encoding = utf-8

# Configuracion de logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
