services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desenreda-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-desenreda}:${POSTGRES_PASSWORD:-desenreda123}@db:5432/${POSTGRES_DB:-desenreda}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    depends_on:
      db:
        condition: service_healthy
    networks:
      - desenreda-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: desenreda-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    networks:
      - desenreda-net

  db:
    image: postgres:16-alpine
    container_name: desenreda-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-desenreda}
      POSTGRES_USER: ${POSTGRES_USER:-desenreda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-desenreda123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - desenreda-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-desenreda} -d ${POSTGRES_DB:-desenreda}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  postgres-data:
    driver: local

networks:
  desenreda-net:
    driver: bridge
